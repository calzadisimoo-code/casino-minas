<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Depositar</title>

<style>

body{
background:#111827;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.caja{

width:320px;
background:#1f2937;
padding:25px;
border-radius:15px;
text-align:center;

}

input{

width:100%;
height:45px;
font-size:20px;
text-align:center;
margin-top:15px;

}

button{

width:100%;
height:50px;
margin-top:20px;
font-size:18px;
background:#16a34a;
color:white;
border:none;
border-radius:10px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="caja">

<h2>💳 Depositar saldo</h2>

<input
id="monto"
type="number"
placeholder="¿Cuánto vas a depositar?">

<button onclick="continuar()">

CONTINUAR

</button>

</div>

<script>

function continuar(){

const monto=document.getElementById("monto").value;

if(monto<10000){

alert("El mínimo es $10.000");

return;

}

localStorage.setItem("montoDeposito",monto);

window.location.href="https://checkout.wompi.co/l/VPOS_hP5CXs";

}

</script>

</body>
</html>
