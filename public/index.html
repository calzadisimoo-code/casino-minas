<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>👑 Royal Casino</title>

<link rel="stylesheet" href="style.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

<div class="contenedor">

    <div id="loginGoogle"></div>

    <div id="juego" style="display:none;">

        <div class="barraSuperior">

            <div class="perfil">

                <img id="foto">

                <div>

                    <div id="nombreUsuario"></div>

                    <div class="online">

                        🟢 <span id="activos">0</span> Online

                    </div>

                </div>

            </div>
<div class="ladoDerecho">

    <button id="depositar" class="btnDepositar">
        💳 Depositar
    </button>
	
<button
id="btnRetirar"
style="
width:90px;
height:30px;
padding:0;
font-size:11px;
background:linear-gradient(45deg,#FFD700,#ff9d00);
color:black;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
">
💸 Retirar
</button>

<div class="saldo">

  <span id="misPuntos" style="font-size:12px;">0</span>

</div>

</div>

        </div>
		
		<div id="turno"></div>
<div id="jugadoresPartida" class="jugadoresPartida">

    <div class="jugadorInfo">

        <img id="fotoJugador1" class="fotoJugador">

        <div>

            <div id="nombreJugador1" class="nombreJugador"></div>

            <div id="saldoJugador1" class="saldoJugador"></div>

        </div>

    </div>

    <div class="premioCentro">

        <div class="tituloPremio">
            🏆 Premio x1.5
        </div>

        <div id="premioPartida" class="valorPremio">
            $0
        </div>

    </div>

    <div class="jugadorInfo derecha">

        <div>

            <div id="nombreJugador2" class="nombreJugador"></div>

            <div id="saldoJugador2" class="saldoJugador"></div>

        </div>

        <img id="fotoJugador2" class="fotoJugador">

    </div>

</div>
        <div id="tablero"></div>

    </div>

</div>

<div id="panelJuego">

    <input
        id="apuesta"
        type="number"
        placeholder="¿Cuánto deseas apostar?">

<button id="jugar">
    <span>🎰</span>
    <span>JUGAR</span>
</button>

</div>

<div id="modalPerfil" class="modalPerfil">
<h1 id="titulo">👑 ROYAL CASINO 👑</h1>

    <div class="ventanaPerfil">

        <img id="fotoPerfilModal" src="">

        <h2 id="nombrePerfil"></h2>

        <h3>
            $ <span id="saldoPerfil"></span>
        </h3>

        <button class="btnPerfil" id="btnDepositarModal">
            💳 Depositar
        </button>

<button class="btnPerfil" id="btnRetirar">
    💸 Retirar
</button>

        <button class="btnCerrar" onclick="cerrarPerfil()">
            Cerrar
        </button>

    </div>

</div>

<div id="esperando" class="pantallaCarga">

    <div>

        <div class="loader"></div>

        <h2>🔎 Buscando rival...</h2>

        <p>Espera un momento</p>

    </div>

</div>

<div id="pantallaBusqueda" class="pantallaBusqueda">

    <div class="ventanaBusqueda">

        <div class="loader"></div>

        <h2>🔍 Buscando rival...</h2>

        <div id="listaMesasBusqueda">

        </div>

        <button id="cancelarBusqueda">

            ❌ Cancelar búsqueda

        </button>

    </div>

</div>

<div id="pantallaResultado" class="pantallaResultado">

    <h1 id="textoResultado"></h1>

</div>

<audio
    id="musicaCasino"
    loop
    preload="auto"
    playsinline>
    <source src="/musica-casino.mp3" type="audio/mpeg">
</audio>

<div id="popupMesa" class="popupMesa">

    <div id="popupNombre"></div>

    <div id="popupTexto"></div>

    <button id="popupAceptar">
        🎰 Aceptar
    </button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="script.js"></script>

</body>

</html>
