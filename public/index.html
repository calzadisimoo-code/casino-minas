<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>👑 Royal Casino</title>

<link rel="stylesheet" href="style.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

<div class="contenedor">

    <div id="loginGoogle"></div>

    <div id="juego" style="display:none;">

        <div class="barraSuperior">

            <div class="perfil">

                <img id="foto">

                <div>

                    <div id="nombreUsuario"></div>

                    <div class="online">

                        🟢 <span id="activos">0</span> Online

                    </div>

                </div>

            </div>
<div class="ladoDerecho">

    <button id="depositar" class="btnDepositar">
        💳 Depositar
    </button>

    <div class="saldo">

        $ <span id="misPuntos">10000</span>

    </div>

</div>

<div class="tituloMesas">

    🎮 PARTIDAS DISPONIBLES

</div>

<div id="listaMesas">

    <div class="sinMesas">

        No hay partidas disponibles

    </div>

</div>

        </div>
		
		<h1 id="titulo">👑 ROYAL CASINO 👑</h1>

<div id="panelJuego">

    <input
        id="apuesta"
        type="number"
        placeholder="¿Cuánto deseas apostar?">

    <button id="jugar">

        🎰 JUGAR

    </button>

</div>
		
		<div id="turno"></div><br>
        <div id="tablero"></div>
		<div id="estado"></div>

    </div>

</div>

<div id="modalPerfil" class="modalPerfil">

    <div class="ventanaPerfil">

        <img id="fotoPerfilModal" src="">

        <h2 id="nombrePerfil"></h2>

        <h3>
            $ <span id="saldoPerfil"></span>
        </h3>

        <button class="btnPerfil" id="btnDepositarModal">
            💳 Depositar
        </button>

<button class="btnPerfil" id="btnRetirar">
    💸 Retirar
</button>

        <button class="btnCerrar" onclick="cerrarPerfil()">
            Cerrar
        </button>

    </div>

</div>

<div id="esperando" class="pantallaCarga">

    <div>

        <div class="loader"></div>

        <h2>🔎 Buscando rival...</h2>

        <p>Espera un momento</p>

    </div>

</div>

<div id="pantallaBusqueda" class="pantallaBusqueda">

    <div class="ventanaBusqueda">

        <div class="loader"></div>

        <h2>🔍 Buscando rival...</h2>

        <p>
            Tu partida está publicada.
            Esperando que otro jugador la acepte.
        </p>

        <button id="cancelarBusqueda">

            ❌ Cancelar búsqueda

        </button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="script.js"></script>

</body>

</html>
